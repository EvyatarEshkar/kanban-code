<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Blue-to-purple liquid glass gradient -->
    <linearGradient id="glass" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="15%" stop-color="#60a5fa"/>
      <stop offset="35%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="75%" stop-color="#8b5cf6"/>
      <stop offset="90%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Highlight/shine gradient for top edge -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner glow for depth -->
    <linearGradient id="innerGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Soft shadow for columns -->
    <filter id="colShadow" x="-15%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle outer glow -->
    <filter id="colGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Off-white background (full bleed, will be masked to rounded rect) -->
  <rect x="0" y="0" width="1024" height="1024" fill="#f5f3f0"/>

  <!-- Subtle warm tint -->
  <rect x="0" y="0" width="1024" height="1024" fill="#faf8f5" opacity="0.5"/>

  <!-- Left column (taller) -->
  <g filter="url(#colShadow)">
    <rect x="230" y="200" width="240" height="520" rx="36" ry="36" fill="url(#glass)"/>
    <rect x="230" y="200" width="240" height="520" rx="36" ry="36" fill="url(#innerGlow)"/>
    <rect x="230" y="200" width="240" height="520" rx="36" ry="36" fill="url(#shine)"/>
    <!-- Glass border -->
    <rect x="230" y="200" width="240" height="520" rx="36" ry="36"
          fill="none" stroke="white" stroke-opacity="0.4" stroke-width="2.5"/>
    <!-- Inner border for depth -->
    <rect x="232" y="202" width="236" height="516" rx="34" ry="34"
          fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  </g>

  <!-- Right column (shorter) -->
  <g filter="url(#colShadow)">
    <rect x="520" y="200" width="240" height="380" rx="36" ry="36" fill="url(#glass)"/>
    <rect x="520" y="200" width="240" height="380" rx="36" ry="36" fill="url(#innerGlow)"/>
    <rect x="520" y="200" width="240" height="380" rx="36" ry="36" fill="url(#shine)"/>
    <!-- Glass border -->
    <rect x="520" y="200" width="240" height="380" rx="36" ry="36"
          fill="none" stroke="white" stroke-opacity="0.4" stroke-width="2.5"/>
    <!-- Inner border for depth -->
    <rect x="522" y="202" width="236" height="376" rx="34" ry="34"
          fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  </g>
</svg>
